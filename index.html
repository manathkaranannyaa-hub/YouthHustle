            color: #cbd5e1;
            max-width: 800px;
            margin: 0 auto;
        }

            margin: 3rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 2.5rem;
        }

            background: #111827;
            padding: 1.75rem;
            border-radius: 16px;
            border: 1px solid #1e293b;
            height: fit-content;

            top: 100px;

            color: #94a3b8;

        }

            border-radius: 16px;
            padding: 2rem;
            display: grid;

        const container = document.getElementById('opportunitiesContainer');
        const filters = {
            category: 'all',
            subject: 'all',
            grade: 'all',
            appFee: 'all',
            deadlineSeason: 'all'
        };

        function renderCards() {
            container.innerHTML = '';
            
            const filteredData = opportunities.filter(item => {
                return (filters.category === 'all' || item.category === filters.category) &&
                       (filters.subject === 'all' || item.subject === filters.subject) &&
                       (filters.grade === 'all' || item.grade === filters.grade) &&
                       (filters.appFee === 'all' || item.appFee === filters.appFee) &&
                       (filters.deadlineSeason === 'all' || item.deadlineSeason === filters.deadlineSeason);
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="no-results">No opportunities found matching your current dashboard parameters. Adjust filters to broaden your search matrix.</div>`;
                return;
            }

            filteredData.forEach(op => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-left">
                        <div>
                            <div class="tags">
                                <span class="tag category">${op.category}</span>
                                <span class="tag subject">${op.subject}</span>
                                <span class="tag grade">${op.grade === 'underclass' ? 'Grades 9-10' : 'Grades 11-12'}</span>
                            </div>
                            <h3>${op.title}</h3>
                            <div class="organization">via ${op.org}</div>
                            <p class="description">${op.desc}</p>
                        </div>
                    </div>
                    <div class="card-details-panel">
                        <div>
                            <div class="detail-item">
                                <span class="detail-label">Application Deadline</span>
                                <span class="detail-value">${op.deadline}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">App Processing Fee</span>
                                <span class="detail-value">${op.appFeeDetail}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Target Group</span>
                                <span class="detail-value">${op.eligibility}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Operating Location</span>
                                <span class="detail-value">${op.location}</span>
                            </div>
                        </div>
                        <a href="${op.url}" target="_blank" class="apply-btn">Visit Official Portal</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const group = e.target.getAttribute('data-filter');
                const val = e.target.getAttribute('data-value');
                
                document.querySelectorAll(`.filter-btn[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                filters[group] = val;
                renderCards();
            });
        });

        renderCards();
    </script>
